<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Resume Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#312e81,#4f46e5);
background-size:400% 400%;
animation:bgMove 10s infinite;
padding:30px;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:1400px;
margin:auto;
}

h1.page-title{
text-align:center;
margin-bottom:25px;
font-size:40px;
}

.grid{
display:grid;
grid-template-columns:420px 1fr;
gap:25px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
}

input,
textarea{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:14px;
}

textarea{
min-height:90px;
resize:vertical;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

.resume{
background:#e8dcc9;
color:#222;
padding:40px;
border-radius:15px;
min-height:1000px;
}

.header{
display:flex;
align-items:center;
gap:20px;
margin-bottom:40px;
}

.header img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid #fff;
}

.name{
font-family:'Merriweather',serif;
font-size:48px;
font-weight:700;
color:#0b8b8b;
}

.details{
font-size:14px;
margin-top:10px;
line-height:1.8;
}

.section{
position:relative;
padding-left:45px;
margin-top:50px;
}

.section::before{
content:'';
position:absolute;
left:12px;
top:30px;
width:2px;
height:100%;
background:#444;
}

.icon{
position:absolute;
left:0;
top:0;
width:25px;
height:25px;
background:black;
border-radius:50%;
}

.title{
font-size:28px;
font-weight:700;
color:#0b8b8b;
margin-bottom:40px;
}

.content{
line-height:1.9;
font-size:15px;
}

.skill{
margin-bottom:25px;
}

.skill-row{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.bar{
height:7px;
background:#111;
}

.fill{
height:100%;
background:#0b8b8b;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.header{
flex-direction:column;
text-align:center;
}

.name{
font-size:36px;
}

}

</style>
</head>
<body>

<div class="container">

<h1 class="page-title">Professional Resume Builder</h1>

<div class="grid">

<div class="card">

<form id="resumeForm">

<input type="text"
id="fullName"
placeholder="Full Name"
required
pattern="[A-Za-z ]+">

<input type="text"
id="jobTitle"
placeholder="Professional Title"
required>

<input type="email"
id="email"
placeholder="Gmail"
required
pattern="[a-zA-Z0-9._%+-]+@gmail\.com$">

<input type="tel"
id="phone"
placeholder="10 Digit Mobile Number"
required
maxlength="10"
pattern="[0-9]{10}">

<input type="text"
id="address"
placeholder="Address"
required>

<input type="url"
id="linkedin"
placeholder="LinkedIn URL"
required>

<input type="url"
id="github"
placeholder="GitHub URL"
required>

<input type="file"
id="profileImage"
accept="image/*"
required>

<textarea id="objective"
placeholder="Career Objective"
required></textarea>

<textarea id="experience"
placeholder="Work Experience"
required></textarea>

<textarea id="skills"
placeholder="Skills (Example: Communication:85)"
required></textarea>

<textarea id="education"
placeholder="Education"
required></textarea>

<textarea id="projects"
placeholder="Projects"
required></textarea>

<textarea id="certifications"
placeholder="Certifications"
required></textarea>

<textarea id="achievements"
placeholder="Achievements"
required></textarea>

<button type="submit">
Generate Resume
</button>

</form>

</div>

<div class="card">

<div id="resumePreview">

<h2 style="text-align:center;">
Resume Preview
</h2>

</div>

</div>

</div>

</div>

<script>

let uploadedImage="";

document
.getElementById("profileImage")
.addEventListener("change",function(e){

const file=e.target.files[0];

if(!file)return;

if(!file.type.startsWith("image/")){
alert("Only image files allowed");
return;
}

const reader=new FileReader();

reader.onload=function(event){
uploadedImage=event.target.result;
};

reader.readAsDataURL(file);

});

document
.getElementById("fullName")
.addEventListener("input",function(){

this.value=this.value.replace(/[^A-Za-z ]/g,'');

});

document
.getElementById("phone")
.addEventListener("input",function(){

this.value=this.value.replace(/\D/g,'');

if(this.value.length>10){
this.value=this.value.slice(0,10);
}

});

document
.getElementById("resumeForm")
.addEventListener("submit",function(e){

e.preventDefault();

if(!this.checkValidity()){
this.reportValidity();
return;
}

generateResume();

});

function buildSkills(skillsText){

const lines=skillsText.split('\n');

let html='';

lines.forEach(line=>{

const parts=line.split(':');

if(parts.length===2){

const skill=parts[0];
const percent=parts[1];

html+=`

<div class="skill">

<div class="skill-row">
<span>${skill}</span>
<span>${percent}%</span>
</div>

<div class="bar">
<div class="fill" style="width:${percent}%"></div>
</div>

</div>

`;

}

});

return html;

}

function generateResume(){

const v=id=>document.getElementById(id).value;

document.getElementById("resumePreview").innerHTML=`

<div class="resume">

<div class="header">

<img src="${uploadedImage}">

<div>

<div class="name">${v('fullName')}</div>

<div class="details">

<b>${v('jobTitle')}</b><br>

Email: ${v('email')}<br>

Phone: ${v('phone')}<br>

Address: ${v('address')}<br>

LinkedIn: ${v('linkedin')}<br>

GitHub: ${v('github')}

</div>

</div>

</div>

<div class="section">

<div class="icon"></div>

<div class="title">Career Objective</div>

<div class="content">

${v('objective').replace(/\n/g,'<br>')}

</div>

</div>

<div class="section">

<div class="icon"></div>

<div class="title">Work Experience</div>

<div class="content">

${v('experience').replace(/\n/g,'<br>')}

</div>

</div>

<div class="section">

<div class="icon"></div>

<div class="title">Core Strengths</div>

<div class="content">

${buildSkills(v('skills'))}

</div>

</div>

<div class="section">

<div class="icon"></div>

<div class="title">Education</div>

<div class="content">

${v('education').replace(/\n/g,'<br>')}

</div>

</div>

<div class="section">

<div class="icon"></div>

<div class="title">Projects</div>

<div class="content">

${v('projects').replace(/\n/g,'<br>')}

</div>

</div>

<div class="section">

<div class="icon"></div>

<div class="title">Certifications</div>

<div class="content">

${v('certifications').replace(/\n/g,'<br>')}

</div>

</div>

<div class="section">

<div class="icon"></div>

<div class="title">Achievements</div>

<div class="content">

${v('achievements').replace(/\n/g,'<br>')}

</div>

</div>

</div>

`;

}

</script>

</body>
</html>
