<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Resume Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
background:linear-gradient(135deg,#0f172a,#312e81,#4f46e5);
background-size:400% 400%;
animation:bgMove 10s infinite;
padding:30px;color:#fff
}
@keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.container{max-width:1400px;margin:auto}
.page-title{text-align:center;margin-bottom:20px}
.grid{display:grid;grid-template-columns:420px 1fr;gap:20px}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);padding:20px;border-radius:20px}
input,textarea{width:100%;padding:12px;margin:8px 0;border:none;border-radius:10px}
textarea{min-height:90px}
button{width:100%;padding:14px;border:none;border-radius:10px;background:#6366f1;color:#fff;cursor:pointer}
.resume{background:#e8dcc9;color:#222;padding:40px;border-radius:15px}
.header{display:flex;gap:20px;align-items:center;margin-bottom:40px}
.header img{width:120px;height:120px;border-radius:50%;object-fit:cover}
.name{font-family:'Merriweather',serif;font-size:48px;color:#0b8b8b}
.details{line-height:1.8}
.section{position:relative;padding-left:45px;margin-top:50px}
.section::before{content:'';position:absolute;left:12px;top:30px;width:2px;height:100%;background:#444}
.icon{position:absolute;left:0;top:0;width:25px;height:25px;background:#000;border-radius:50%}
.title{font-size:28px;font-weight:700;color:#0b8b8b;margin-bottom:40px}
.content{line-height:1.9}
.skill{margin-bottom:20px}
.skill-row{display:flex;justify-content:space-between;margin-bottom:6px}
.bar{height:7px;background:#111}
.fill{height:100%;background:#0b8b8b}
@media(max-width:900px){.grid{grid-template-columns:1fr}.header{flex-direction:column}.name{font-size:36px}}
</style>
</head>
<body>
<div class="container">
<h1 class="page-title">Professional Resume Builder</h1>
<div class="grid">
<div class="card">
<form id="resumeForm">
<input type="text" id="fullName" placeholder="Full Name" required pattern="[A-Za-z ]+">
<input type="text" id="jobTitle" placeholder="Professional Title" required>
<input type="email" id="email" placeholder="Gmail" required pattern="[a-zA-Z0-9._%+-]+@gmail\.com$">
<input type="tel" id="phone" placeholder="10 Digit Mobile Number" required maxlength="10" pattern="[0-9]{10}">
<input type="text" id="address" placeholder="Address" required>
<input type="url" id="linkedin" placeholder="LinkedIn URL" required>
<input type="url" id="github" placeholder="GitHub URL" required>
<input type="file" id="profileImage" accept="image/*" required>
<textarea id="objective" placeholder="Career Objective" required></textarea>
<textarea id="experience" placeholder="Work Experience" required></textarea>
<textarea id="skills" placeholder="Skills e.g. Communication:85" required></textarea>
<textarea id="education" placeholder="Education" required></textarea>
<textarea id="projects" placeholder="Projects" required></textarea>
<textarea id="certifications" placeholder="Certifications" required></textarea>
<textarea id="achievements" placeholder="Achievements" required></textarea>
<button type="submit">Generate Resume</button>
</form>
</div>

<div class="card">
<div id="resumePreview"><h2 style="text-align:center">Resume Preview</h2></div>
<button id="downloadBtn" style="margin-top:15px">Download Resume JPG</button>
</div>
</div>
</div>

<script>
let uploadedImage="";

profileImage.addEventListener("change",e=>{
const file=e.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=x=>uploadedImage=x.target.result;
reader.readAsDataURL(file);
});

fullName.addEventListener("input",function(){
this.value=this.value.replace(/[^A-Za-z ]/g,'');
});

phone.addEventListener("input",function(){
this.value=this.value.replace(/\D/g,'');
if(this.value.length>10)this.value=this.value.slice(0,10);
});

function buildSkills(txt){
let html='';
txt.split('\n').forEach(line=>{
const p=line.split(':');
if(p.length===2){
html+=`<div class="skill">
<div class="skill-row"><span>${p[0]}</span><span>${p[1]}%</span></div>
<div class="bar"><div class="fill" style="width:${p[1]}%"></div></div>
</div>`;
}
});
return html;
}

resumeForm.addEventListener("submit",e=>{
e.preventDefault();
if(!resumeForm.checkValidity()){resumeForm.reportValidity();return;}
const v=id=>document.getElementById(id).value;

resumePreview.innerHTML=`
<div class="resume">
<div class="header">
<img src="${uploadedImage}">
<div>
<div class="name">${v('fullName')}</div>
<div class="details">
<b>${v('jobTitle')}</b><br>
Email: ${v('email')}<br>
Phone: ${v('phone')}<br>
Address: ${v('address')}<br>
LinkedIn: ${v('linkedin')}<br>
GitHub: ${v('github')}
</div>
</div>
</div>

<div class="section"><div class="icon"></div><div class="title">Career Objective</div><div class="content">${v('objective')}</div></div>
<div class="section"><div class="icon"></div><div class="title">Work Experience</div><div class="content">${v('experience').replace(/\n/g,'<br>')}</div></div>
<div class="section"><div class="icon"></div><div class="title">Core Strengths</div><div class="content">${buildSkills(v('skills'))}</div></div>
<div class="section"><div class="icon"></div><div class="title">Education</div><div class="content">${v('education').replace(/\n/g,'<br>')}</div></div>
<div class="section"><div class="icon"></div><div class="title">Projects</div><div class="content">${v('projects').replace(/\n/g,'<br>')}</div></div>
<div class="section"><div class="icon"></div><div class="title">Certifications</div><div class="content">${v('certifications').replace(/\n/g,'<br>')}</div></div>
<div class="section"><div class="icon"></div><div class="title">Achievements</div><div class="content">${v('achievements').replace(/\n/g,'<br>')}</div></div>
</div>`;
});

downloadBtn.addEventListener("click",()=>{
const resume=document.querySelector(".resume");
if(!resume){alert("Generate resume first");return;}

html2canvas(resume,{
scale:4,
useCORS:true,
backgroundColor:"#e8dcc9"
}).then(canvas=>{
const link=document.createElement("a");
link.download="Resume.jpg";
link.href=canvas.toDataURL("image/jpeg",1.0);
link.click();
});
});
</script>
</body>
</html>
