Replace only the form section inside:

```html
<div class="card">
```

with:

```html
<div class="card">

<form id="resumeForm">

<input
type="text"
id="fullName"
placeholder="Full Name"
required
pattern="[A-Za-z ]+"
title="Only letters allowed">

<input
type="text"
id="jobTitle"
placeholder="Professional Title"
required>

<input
type="email"
id="email"
placeholder="Email"
required
pattern="[a-zA-Z0-9._%+-]+@gmail\.com$"
title="Enter Gmail only">

<input
type="tel"
id="phone"
placeholder="Phone Number"
required
maxlength="10"
pattern="[0-9]{10}"
title="Enter exactly 10 digits">

<input
type="text"
id="address"
placeholder="Address"
required>

<input
type="url"
id="linkedin"
placeholder="LinkedIn URL"
required>

<input
type="url"
id="github"
placeholder="GitHub URL"
required>

<input
type="url"
id="website"
placeholder="Portfolio Website"
required>

<input
type="file"
id="profileImage"
accept="image/png,image/jpeg,image/jpg,image/webp"
required>

<textarea
id="summary"
placeholder="Professional Summary"
required></textarea>

<textarea
id="experience"
placeholder="Work Experience"
required></textarea>

<textarea
id="education"
placeholder="Education"
required></textarea>

<textarea
id="skills"
placeholder="Skills"
required></textarea>

<textarea
id="projects"
placeholder="Projects"
required></textarea>

<textarea
id="certifications"
placeholder="Certifications"
required></textarea>

<button type="submit">
Generate Resume
</button>

</form>

</div>
```

Then replace your entire `<script>` block with:

```html
<script>

let uploadedImage="";

document.getElementById("profileImage").addEventListener("change",function(e){

const file=e.target.files[0];

if(!file)return;

if(!file.type.startsWith("image/")){
alert("Only image files allowed");
this.value="";
return;
}

const reader=new FileReader();

reader.onload=function(event){
uploadedImage=event.target.result;
};

reader.readAsDataURL(file);

});

document.getElementById("fullName").addEventListener("input",function(){

this.value=this.value.replace(/[^A-Za-z ]/g,'');

});

document.getElementById("phone").addEventListener("input",function(){

this.value=this.value.replace(/\D/g,'');

if(this.value.length>10){
this.value=this.value.slice(0,10);
}

});

document.getElementById("resumeForm").addEventListener("submit",function(e){

e.preventDefault();

if(!this.checkValidity()){
this.reportValidity();
return;
}

generateResume();

});

function generateResume(){

let v=id=>document.getElementById(id).value;

document.getElementById("resumePreview").innerHTML=`

<div class="resume-preview">

<div class="resume-left">

<img src="${uploadedImage}">

<h3 style="margin-top:15px">PROFILE</h3>

<p>${v('summary')}</p>

<h3 style="margin-top:20px">SKILLS</h3>

<p>${v('skills').replace(/\n/g,'<br>')}</p>

</div>

<div class="resume-right">

<div class="resume-title">${v('fullName')}</div>

<p><b>${v('jobTitle')}</b></p>

<p>${v('email')} | ${v('phone')}</p>

<p>${v('address')}</p>

<p>${v('linkedin')}</p>

<p>${v('github')}</p>

<p>${v('website')}</p>

<h2 style="margin-top:25px">WORK EXPERIENCE</h2>

<p>${v('experience').replace(/\n/g,'<br>')}</p>

<h2 style="margin-top:25px">EDUCATION</h2>

<p>${v('education').replace(/\n/g,'<br>')}</p>

<h2 style="margin-top:25px">PROJECTS</h2>

<p>${v('projects').replace(/\n/g,'<br>')}</p>

<h2 style="margin-top:25px">CERTIFICATIONS</h2>

<p>${v('certifications').replace(/\n/g,'<br>')}</p>

</div>

</div>

`;

}

</script>
```
